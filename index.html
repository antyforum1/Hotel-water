<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Скрипт звонка — HoReCa</title>
    <style>
        :root { --primary: #00d1b2; --bg: #1a1a1a; --card: #2d2d2d; --text: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.4; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #444; }
        h2 { color: var(--primary); margin-top: 0; font-size: 1.2rem; }
        .step { border-left: 3px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        .instruction { font-size: 0.9rem; color: #ccc; margin-bottom: 10px; }
        textarea { width: 100%; background: #333; border: 1px solid #555; border-radius: 8px; color: white; padding: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: var(--primary); border: none; border-radius: 10px; padding: 15px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .status { font-size: 0.8rem; text-align: center; color: #888; margin-top: 5px; }
        .timer { font-family: monospace; font-size: 1.5rem; text-align: center; display: block; margin-bottom: 10px; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <span id="timer" class="timer">00:00</span>
            <button id="startBtn" style="background: #4a4a4a; color: white;">▶ СТАРТ ЗВОНКА</button>
        </div>

        <div class="card">
            <h2>1. Выход на ЛПР</h2>
            <div class="step">
                <p class="instruction">Ресепшн:</p>
                <b>— Добрый день! Соедините, пожалуйста, с отделом закупок или тем, кто занимается поставками воды.</b>
            </div>
        </div>

        <div class="card">
            <h2>2. Разведка (Боли)</h2>
            <textarea id="notes" rows="4" placeholder="Что рассказал собеседник? (цены, недовольство, объемы...)"></textarea>
            <button id="sendBtn">СОХРАНИТЬ В ТАБЛИЦУ</button>
            <div id="status" class="status">Готов к отправке</div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxY4DZKGfCsZ-LOnl8Nl67Z-W9C6y9mX3vF_v-H3k-PZ-LOnl8/exec'; // Твой URL
        let seconds = 0;
        let timerInterval;

        document.getElementById('startBtn').onclick = function() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                document.getElementById('timer').innerText = ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')};
            }, 1000);
            this.style.background = '#ff3860';
            this.innerText = 'ЗВОНОК ИДЕТ...';
        };

        document.getElementById('sendBtn').onclick = async function() {
            const notes = document.getElementById('notes').value;
            const status = document.getElementById('status');
            
            if(!notes) { alert('Введите примечания!'); return; }
            
            status.innerText = 'Отправка...';
            this.disabled = true;

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        date: new Date().toLocaleDateString(),
                        time: new Date().toLocaleTimeString(),notes: notes,
                        duration: document.getElementById('timer').innerText,
                        manager: 'Сергей',
                        hotel: 'КРАСНОДАР - РАЗВЕДКА'
                    })
                });
                status.innerText = '✅ Успешно отправлено!';
                document.getElementById('notes').value = '';
            } catch (e) {
                status.innerText = '❌ Ошибка отправки';
            }
            this.disabled = false;
        };
    </script>
</body>
</html>
